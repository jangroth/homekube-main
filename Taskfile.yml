version: "3"

vars:
  ANSIBLE_DIR: ./ansible

tasks:
  default:
    desc: "List available tasks"
    cmd: task --list

  setup:
    desc: "Install Python dependencies and Ansible collections"
    cmds:
      - uv sync
      - uv run ansible-galaxy collection install -r {{.ANSIBLE_DIR}}/requirements.yml

  setup-cni:
    desc: "Install and configure CNI (Cilium)"
    dir: "{{.ANSIBLE_DIR}}"
    cmd: uv run ansible-playbook 05-setup-cni.yml

  setup-gitops:
    desc: "Install and configure GitOps (ArgoCD)"
    dir: "{{.ANSIBLE_DIR}}"
    cmd: uv run ansible-playbook 06-setup-gitops.yml

  update-all:
    desc: "Update both control node and Kubernetes nodes"
    deps:
      - update-control-node
      - update-k8s-nodes

  update-control-node:
    desc: "Update control node (darth) with tools and configuration"
    dir: "{{.ANSIBLE_DIR}}"
    cmd: uv run ansible-playbook 01-update-control-node.yml --tags update-only

  update-k8s-nodes:
    desc: "Update Kubernetes nodes (system packages, storage)"
    dir: "{{.ANSIBLE_DIR}}"
    cmd: uv run ansible-playbook 03-setup-k8s-nodes.yml --tags update-only
